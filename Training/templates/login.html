{% load static %}

<!DOCTYPE html>

<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>
        Login
    </title>

    <link
        rel="stylesheet"
        href="{% static 'css/style.css' %}"
    >

</head>

<body class="login-page">

    <div class="login-box">

        <h1>
            Fresher Login
        </h1>

        <p>
            Login to access the training portal
        </p>


        {% if message %}

            <p class="error">

                {{ message }}

            </p>

        {% endif %}


        <form method="POST">

            {% csrf_token %}


            <label>

                Username

            </label>

            <input
                type="text"
                name="username"
                placeholder="Enter username"
                required
            >


            <label>

                Password

            </label>

            <input
                type="password"
                name="password"
                placeholder="Enter password"
                required
            >


            <button type="submit">

                Login

            </button>

        </form>

    </div>

</body>

</html>
